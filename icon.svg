<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150e24"/>
      <stop offset="100%" stop-color="#0e0918"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="rgba(255,107,61,0.12)"/>
      <stop offset="60%" stop-color="rgba(167,139,250,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Scale down to ~80% with padding for proper macOS dock sizing -->
  <g transform="translate(100 100) scale(0.80469)">
    <!-- macOS squircle background -->
    <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
    <rect width="1024" height="1024" rx="228" fill="url(#glow)"/>
    <rect width="1024" height="1024" rx="228" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
    <!-- Five dots logo - cross/plus pattern, centered -->
    <!-- Grid: 2x2 outer dots + 1 center dot (larger) -->
    <circle cx="380" cy="380" r="100" fill="#5b8def"/>   <!-- top-left: blue -->
    <circle cx="644" cy="380" r="100" fill="#6befa0"/>   <!-- top-right: green -->
    <circle cx="380" cy="644" r="100" fill="#a06bef"/>   <!-- bottom-left: purple -->
    <circle cx="644" cy="644" r="100" fill="#ef6b6b"/>   <!-- bottom-right: red -->
    <circle cx="512" cy="512" r="120" fill="#ff6b3d"/>   <!-- center: orange (larger) -->
    <!-- Subtle shadow under center dot -->
  </g>
</svg>
